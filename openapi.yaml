    # ==================== LOG SCHEMAS ====================
    LogEntry:
      type: object
      properties:
        id:
          type: integer
          description: ID del log
          example: 1
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora del log
          example: "2024-01-15T10:00:00Z"
        nivel:
          type: string
          description: Nivel del log
          enum: [Verbose, Debug, Information, Warning, Error, Fatal]
          example: Information
        mensaje:
          type: string
          description: Mensaje del log
          example: Usuario admin inició sesión exitosamente
        excepcion:
          type: string
          nullable: true
          description: Información de la excepción (si aplica)
          example: null
        username:
          type: string
          nullable: true
          description: Usuario asociado al log
          example: admin
        requestPath:
          type: string
          nullable: true
          description: Ruta de la petición HTTP
          example: /api/auth/login
        requestMethod:
          type: string
          nullable: true
          description: Método HTTP
          example: POST
        ipAddress:
          type: string
          nullable: true
          description: Dirección IP del cliente
          example: 192.168.1.100
        userAgent:
          type: string
          nullable: true
          description: User Agent del cliente
          example: Mozilla/5.0 (Windows NT 10.0; Win64; x64)
        propiedades:
          type: object
          nullable: true
          description: Propiedades adicionales del log
          additionalProperties: true

    # ==================== ERROR SCHEMAS ====================
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Tipo de error
          example: Bad Request
        message:
          type: string
          description: Mensaje descriptivo del error
          example: Los datos proporcionados no son válidos
        details:
          type: array
          nullable: true
          description: Detalles adicionales del error (opcional)
          items:
            type: object
            properties:
              field:
                type: string
                description: Campo con error
                example: email
              message:
                type: string
                description: Mensaje de error del campo
                example: El formato del email no es válido
