        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Autenticación mediante JWT Bearer Token.
        
        Para obtener un token:
        1. Realiza POST a /api/auth/login con username y password
        2. Copia el token de la respuesta
        3. Incluye el token en el header: `Authorization: Bearer {token}`

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      description: ID del recurso
      schema:
        type: integer
        format: int32
        minimum: 1

  responses:
    BadRequest:
      description: Solicitud incorrecta - Error de validación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: Error de validación
              value:
                error: Validation Error
                message: Los datos proporcionados no son válidos
                details:
                  - field: email
                    message: El formato del email no es válido
                  - field: password
                    message: La contraseña debe tener al menos 8 caracteres

    Unauthorized:
      description: No autorizado - Token inválido o no proporcionado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noToken:
              summary: Token no proporcionado
              value:
                error: Unauthorized
                message: No se ha proporcionado un token de autenticación
            invalidToken:
              summary: Token inválido
              value:
                error: Unauthorized
                message: El token proporcionado no es válido o ha expirado

    Forbidden:
      description: Prohibido - Sin permisos suficientes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            insufficientPermissions:
              summary: Permisos insuficientes
              value:
                error: Forbidden
                message: No tienes permisos suficientes para realizar esta operación

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            resourceNotFound:
              summary: Recurso no encontrado
              value:
                error: Not Found
                message: El recurso solicitado no existe

    Conflict:
      description: Conflicto - El recurso ya existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            duplicateResource:
              summary: Recurso duplicado
              value:
                error: Conflict
                message: Ya existe un usuario con ese nombre de usuario

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            serverError:
              summary: Error del servidor
              value:
                error: Internal Server Error
                message: Ha ocurrido un error inesperado. Por favor, inténtelo más tarde

  schemas:
    # ==================== AUTH SCHEMAS ====================
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Nombre de usuario
          example: admin
        password:
          type: string
          format: password
          description: Contraseña del usuario
          example: Admin123!

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        username:
          type: string
          description: Nombre de usuario
          example: admin
        rol:
          type: string
          description: Rol del usuario
          enum: [Admin, Usuario]
          example: Admin
        expiresAt:
          type: string
          format: date-time
          description: Fecha de expiración del token
          example: "2024-01-15T15:30:00Z"

    RefreshTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Token JWT actual
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    # ==================== USUARIO SCHEMAS ====================
    Usuario:
      type: object
      properties:
        id:
          type: integer
          description: ID del usuario
          example: 1
        username:
          type: string
          description: Nombre de usuario
          example: admin
        email:
          type: string
          format: email
          description: Email del usuario
          example: admin@kindohub.com
        nombreCompleto:
          type: string
          description: Nombre completo del usuario
          example: Administrador Principal
        rol:
          type: string
          description: Rol del usuario
          enum: [Admin, Usuario]
          example: Admin
        activo:
          type: boolean
          description: Indica si el usuario está activo
          example: true
        fechaCreacion:
          type: string
          format: date-time
          description: Fecha de creación del usuario
          example: "2024-01-01T10:00:00Z"
        fechaModificacion:
          type: string
          format: date-time
          description: Fecha de última modificación
          example: "2024-01-15T14:30:00Z"

    CreateUsuarioRequest:
      type: object
      required:
        - username
        - password
        - email
        - nombreCompleto
        - rol
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Nombre de usuario (único)
          example: usuario1
        password:
          type: string
          format: password
          minLength: 8
          description: Contraseña (mínimo 8 caracteres)
          example: Usuario123!
        email:
          type: string
          format: email
          description: Email del usuario
          example: usuario1@kindohub.com
        nombreCompleto:
          type: string
          minLength: 3
          maxLength: 100
          description: Nombre completo del usuario
          example: Usuario Ejemplo
        rol:
          type: string
          enum: [Admin, Usuario]
          description: Rol del usuario
          example: Usuario

    UpdateUsuarioRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email del usuario
          example: usuario1@kindohub.com
        nombreCompleto:
          type: string
          minLength: 3
          maxLength: 100
          description: Nombre completo del usuario
          example: Usuario Ejemplo Actualizado
        password:
          type: string
          format: password
          minLength: 8
          description: Nueva contraseña (opcional)
          example: NuevaPassword123!
        rol:
          type: string
          enum: [Admin, Usuario]
          description: Rol del usuario
          example: Usuario
        activo:
          type: boolean
          description: Estado del usuario
          example: true

