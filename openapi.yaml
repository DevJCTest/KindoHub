openapi: 3.0.3
info:
  title: KindoHub API
  description: |
    **KindoHub** es una API RESTful para la gestión de familias y alumnos de una asociación de madres y padres de alumnos.
    
    ## Características Principales
    - 🔐 Autenticación y Autorización basada en JWT Bearer Tokens
    - 👥 Gestión de Usuarios con control de roles (Admin/Usuario)
    - 👨‍👩‍👧‍👦 Gestión de Familias y asociados
    - 🎓 Gestión de Alumnos con histórico de cambios
    - 📚 Gestión de Cursos académicos
    - 📝 Sistema de Anotaciones
    - 💳 Formas de Pago
    - 📊 Logging Centralizado con Serilog
    
    ## Stack Tecnológico
    - Framework: .NET 8.0
    - Lenguaje: C# 12
    - Base de Datos: SQL Server
    - Autenticación: JWT Bearer
    - Validación: FluentValidation
    
    ## Creación del primer usuario
    para crear el primer usuario administrador, puedes usar el endpoint de registro público:
    
    ```bash
    POST /api/usuarios/registrar
    ```

    ## Autenticación
    La mayoría de los endpoints requieren autenticación mediante JWT Bearer Token.
    
    1. Obtén un token mediante el endpoint `/api/auth/login`
    2. Incluye el token en el header `Authorization: Bearer {token}`
    
    ## Licencia
    Este proyecto está bajo la licencia MIT.
  version: 1.0.0
  contact:
    name: Equipo KindoHub
    url: https://github.com/DevJCTest/KindoHub
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://localhost:7001
    description: Servidor de desarrollo (HTTPS)
  - url: http://localhost:5001
    description: Servidor de desarrollo (HTTP)

tags:
  - name: Autenticación
    description: Endpoints de autenticación y gestión de tokens JWT
  - name: Usuarios
    description: Gestión de usuarios del sistema
  - name: Familias
    description: Gestión de núcleos familiares y asociados
  - name: Alumnos
    description: Gestión de alumnos con histórico de cambios
  - name: Cursos
    description: Gestión de cursos académicos
  - name: Anotaciones
    description: Sistema de seguimiento de observaciones
  - name: Formas de Pago
    description: Catálogo de métodos de pago
  - name: Logs
    description: Consulta de logs del sistema

security:
  - BearerAuth: []

paths:
  # ==================== AUTENTICACIÓN ====================
  /api/auth/login:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión
      description: Autentica un usuario y devuelve un token JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                summary: Login de administrador
                value:
                  username: admin
                  password: Admin123!
              example2:
                summary: Login de usuario
                value:
                  username: usuario1
                  password: Usuario123!
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                example1:
                  summary: Respuesta exitosa
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    username: admin
                    rol: Admin
                    expiresAt: "2024-01-15T15:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/refresh:
    post:
      tags:
        - Autenticación
      summary: Refrescar token
      description: Obtiene un nuevo token JWT usando un token válido
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refrescado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== USUARIOS ====================
  /api/usuarios:
    get:
      tags:
        - Usuarios
      summary: Listar usuarios
      description: Obtiene la lista de todos los usuarios del sistema
      operationId: getUsuarios
      parameters:
        - name: rol
          in: query
          description: Filtrar por rol
          schema:
            type: string
            enum: [Admin, Usuario]
        - name: activo
          in: query
          description: Filtrar por estado activo
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Usuarios
      summary: Crear usuario
      description: Registra un nuevo usuario en el sistema
      operationId: createUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsuarioRequest'
            examples:
              admin:
                summary: Crear administrador
                value:
                  username: admin2
                  password: Admin123!
                  email: admin2@kindohub.com
                  nombreCompleto: Administrador 2
                  rol: Admin
              usuario:
                summary: Crear usuario
                value:
                  username: usuario2
                  password: Usuario123!
                  email: usuario2@kindohub.com
                  nombreCompleto: Usuario 2
                  rol: Usuario
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      description: Obtiene los detalles de un usuario específico
      operationId: getUsuarioById
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Detalles del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Usuarios
      summary: Actualizar usuario
      description: Actualiza los datos de un usuario existente
      operationId: updateUsuario
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Usuarios
      summary: Eliminar usuario
      description: Elimina un usuario del sistema (eliminación lógica)
      operationId: deleteUsuario
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Usuario eliminado exitosamente
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/usuarios/registrar:
    post:
      tags:
        - Usuarios
      summary: Registrar nuevo usuario (público)
      description: Permite el registro de nuevos usuarios sin autenticación
      operationId: registrarUsuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsuarioRequest'
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== FAMILIAS ====================
  /api/familias:
    get:
      tags:
        - Familias
      summary: Listar familias
      description: Obtiene la lista de todas las familias registradas
      operationId: getFamilias
      parameters:
        - name: estadoAsociado
          in: query
          description: Filtrar por estado de asociado
          schema:
            type: string
        - name: formaPagoId
          in: query
          description: Filtrar por forma de pago
          schema:
            type: integer
      responses:
        '200':
          description: Lista de familias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Familia'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Familias
      summary: Crear familia
      description: Registra una nueva familia en el sistema
      operationId: createFamilia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFamiliaRequest'
            examples:
              example1:
                summary: Familia completa
                value:
                  apellidos: García López
                  direccion: Calle Principal 123
                  codigoPostal: "28001"
                  localidad: Madrid
                  provincia: Madrid
                  telefono1: "612345678"
                  telefono2: "912345678"
                  email: garcia.lopez@email.com
                  formaPagoId: 1
                  estadoAsociadoId: 1
                  observaciones: Familia con 2 alumnos
      responses:
        '201':
          description: Familia creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Familia'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/familias/{id}:
    get:
      tags:
        - Familias
      summary: Obtener familia por ID
      description: Obtiene los detalles de una familia específica
      operationId: getFamiliaById
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Detalles de la familia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Familia'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Familias
      summary: Actualizar familia
      description: Actualiza los datos de una familia existente
      operationId: updateFamilia
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFamiliaRequest'
      responses:
        '200':
          description: Familia actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Familia'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Familias
      summary: Eliminar familia
      description: Elimina una familia del sistema
      operationId: deleteFamilia
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Familia eliminada exitosamente
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== ALUMNOS ====================
  /api/alumnos:
    get:
      tags:
        - Alumnos
      summary: Listar alumnos
      description: Obtiene la lista de todos los alumnos registrados
      operationId: getAlumnos
      parameters:
        - name: familiaId
          in: query
          description: Filtrar por familia
          schema:
            type: integer
        - name: cursoId
          in: query
          description: Filtrar por curso
          schema:
            type: integer
        - name: activo
          in: query
          description: Filtrar por estado activo
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de alumnos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alumno'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Alumnos
      summary: Crear alumno
      description: Registra un nuevo alumno en el sistema
      operationId: createAlumno
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlumnoRequest'
            examples:
              example1:
                summary: Alumno nuevo
                value:
                  nombre: Juan
                  apellidos: García López
                  fechaNacimiento: "2015-05-15"
                  cursoId: 1
                  familiaId: 1
                  observaciones: Alergia a los frutos secos
      responses:
        '201':
          description: Alumno creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alumno'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/alumnos/{id}:
    get:
      tags:
        - Alumnos
      summary: Obtener alumno por ID
      description: Obtiene los detalles de un alumno específico
      operationId: getAlumnoById
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Detalles del alumno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alumno'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Alumnos
      summary: Actualizar alumno
      description: Actualiza los datos de un alumno existente (genera histórico de cambios)
      operationId: updateAlumno
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlumnoRequest'
      responses:
        '200':
          description: Alumno actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alumno'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Alumnos
      summary: Eliminar alumno
      description: Elimina un alumno del sistema (eliminación lógica)
      operationId: deleteAlumno
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Alumno eliminado exitosamente
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/alumnos/{id}/historial:
    get:
      tags:
        - Alumnos
      summary: Obtener historial de cambios
      description: Obtiene el historial completo de cambios de un alumno
      operationId: getAlumnoHistorial
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Historial de cambios del alumno
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlumnoHistorial'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== CURSOS ====================
  /api/cursos:
    get:
      tags:
        - Cursos
      summary: Listar cursos
      description: Obtiene la lista de todos los cursos académicos
      operationId: getCursos
      parameters:
        - name: activo
          in: query
          description: Filtrar por estado activo
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de cursos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Curso'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Cursos
      summary: Crear curso
      description: Registra un nuevo curso académico
      operationId: createCurso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCursoRequest'
            examples:
              infantil:
                summary: Educación Infantil
                value:
                  nombre: Infantil 3 años
                  descripcion: Educación Infantil - 3 años
                  nivel: Infantil
                  orden: 1
              primaria:
                summary: Educación Primaria
                value:
                  nombre: 1º Primaria
                  descripcion: Primero de Educación Primaria
                  nivel: Primaria
                  orden: 4
      responses:
        '201':
          description: Curso creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curso'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/cursos/{id}:
    get:
      tags:
        - Cursos
      summary: Obtener curso por ID
      description: Obtiene los detalles de un curso específico
      operationId: getCursoById
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Detalles del curso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curso'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Cursos
      summary: Actualizar curso
      description: Actualiza los datos de un curso existente
      operationId: updateCurso
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCursoRequest'
      responses:
        '200':
          description: Curso actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Curso'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Cursos
      summary: Eliminar curso
      description: Elimina un curso del sistema
      operationId: deleteCurso
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Curso eliminado exitosamente
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== ANOTACIONES ====================
  /api/anotaciones:
    get:
      tags:
        - Anotaciones
      summary: Listar anotaciones
      description: Obtiene la lista de todas las anotaciones
      operationId: getAnotaciones
      parameters:
        - name: alumnoId
          in: query
          description: Filtrar por alumno
          schema:
            type: integer
        - name: familiaId
          in: query
          description: Filtrar por familia
          schema:
            type: integer
        - name: tipo
          in: query
          description: Filtrar por tipo de anotación
          schema:
            type: string
        - name: fechaDesde
          in: query
          description: Fecha desde (formato ISO 8601)
          schema:
            type: string
            format: date
        - name: fechaHasta
          in: query
          description: Fecha hasta (formato ISO 8601)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Lista de anotaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Anotacion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Anotaciones
      summary: Crear anotación
      description: Registra una nueva anotación
      operationId: createAnotacion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnotacionRequest'
            examples:
              alumno:
                summary: Anotación de alumno
                value:
                  titulo: Comportamiento destacado
                  descripcion: El alumno ha mostrado un comportamiento ejemplar
                  tipo: Positiva
                  alumnoId: 1
                  fechaAnotacion: "2024-01-15"
              familia:
                summary: Anotación de familia
                value:
                  titulo: Retraso en pago
                  descripcion: Familia con retraso en el pago de la cuota
                  tipo: Administrativa
                  familiaId: 1
                  fechaAnotacion: "2024-01-15"
      responses:
        '201':
          description: Anotación creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anotacion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/anotaciones/{id}:
    get:
      tags:
        - Anotaciones
      summary: Obtener anotación por ID
      description: Obtiene los detalles de una anotación específica
      operationId: getAnotacionById
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
